name: Build Minecraft Server

# Trigger manually from the "Actions" tab in GitHub
on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft version (e.g. 1.21.1, or "latest" / "latest-snapshot")'
        required: true
        default: 'latest'
      accept_eula:
        description: 'Accept the Mojang EULA? (must be "true" to produce a runnable server)'
        required: true
        default: 'true'
      motd:
        description: 'Server MOTD (message of the day)'
        required: false
        default: 'A Minecraft Server built by GitHub Actions'
      difficulty:
        description: 'easy / normal / hard / peaceful'
        required: false
        default: 'normal'
      gamemode:
        description: 'survival / creative / adventure / spectator'
        required: false
        default: 'survival'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Resolve requested version to a real Mojang version id
        id: resolve
        run: |
          set -euo pipefail
          MANIFEST_URL="https://piston-meta.mojang.com/mc/game/version_manifest_v2.json"
          curl -s "$MANIFEST_URL" -o manifest.json

          REQ="${{ github.event.inputs.mc_version }}"

          if [ "$REQ" = "latest" ]; then
            VERSION=$(jq -r '.latest.release' manifest.json)
          elif [ "$REQ" = "latest-snapshot" ]; then
            VERSION=$(jq -r '.latest.snapshot' manifest.json)
          else
            VERSION="$REQ"
          fi

          # Confirm it exists in the manifest
          VERSION_URL=$(jq -r --arg v "$VERSION" '.versions[] | select(.id == $v) | .url' manifest.json)

          if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" = "null" ]; then
            echo "::error::Version '$VERSION' not found in Mojang version manifest."
            echo "Available versions (first 30):"
            jq -r '.versions[].id' manifest.json | head -30
            exit 1
          fi

          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_url=$VERSION_URL" >> "$GITHUB_OUTPUT"

      - name: Fetch server jar download URL
        id: server_url
        run: |
          set -euo pipefail
          curl -s "${{ steps.resolve.outputs.version_url }}" -o version.json
          SERVER_URL=$(jq -r '.downloads.server.url' version.json)

          if [ -z "$SERVER_URL" ] || [ "$SERVER_URL" = "null" ]; then
            echo "::error::This version has no downloadable server jar (some very old/very new versions don't)."
            exit 1
          fi

          echo "server_url=$SERVER_URL" >> "$GITHUB_OUTPUT"

      - name: Download server jar
        run: |
          mkdir -p server
          curl -s -o "server/server.jar" "${{ steps.server_url.outputs.server_url }}"
          echo "Downloaded server.jar for version ${{ steps.resolve.outputs.version }}"
          ls -lh server/

      - name: Write eula.txt
        run: |
          echo "eula=${{ github.event.inputs.accept_eula }}" > server/eula.txt

      - name: Write server.properties
        run: |
          cat > server/server.properties <<EOF
          motd=${{ github.event.inputs.motd }}
          difficulty=${{ github.event.inputs.difficulty }}
          gamemode=${{ github.event.inputs.gamemode }}
          max-players=20
          online-mode=true
          server-port=25565
          EOF

      - name: Add start scripts
        run: |
          cat > server/start.sh <<'EOF'
          #!/usr/bin/env bash
          # Adjust -Xmx / -Xms to match the RAM available on the machine running this.
          java -Xmx2G -Xms1G -jar server.jar nogui
          EOF
          chmod +x server/start.sh

          cat > server/start.bat <<'EOF'
          @echo off
          java -Xmx2G -Xms1G -jar server.jar nogui
          pause
          EOF

      - name: Write README for this build
        run: |
          cat > server/README.txt <<EOF
          Minecraft Server Build
          =======================
          Version: ${{ steps.resolve.outputs.version }}
          Built:   $(date -u +"%Y-%m-%d %H:%M UTC")

          This package was built by a GitHub Actions workflow and contains the
          official Mojang server.jar plus basic config. GitHub Actions cannot
          host a live, joinable server (no public inbound networking, jobs
          time out), so download this artifact and run it somewhere with a
          real network path to your players:

            - Your own PC (for LAN or with port forwarding / a tunnel like
              ngrok / playit.gg / Tailscale Funnel)
            - A VPS or cloud VM (recommended for always-on public servers)
            - A Docker host (see the Dockerfile in this repo if you added it)

          To run locally:
            Linux/macOS: ./start.sh
            Windows:     start.bat

          Requires a matching Java version installed (Java 21+ for modern
          Minecraft versions, Java 17 for 1.18-1.20.x, Java 8 for older
          versions).
          EOF

      - name: Upload server as artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-${{ steps.resolve.outputs.version }}
          path: server/
          retention-days: 14
